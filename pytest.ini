[pytest]
addopts = --import-mode=importlib --strict-markers
testpaths =
    drone/ros2_ws/src/bennu_camera/test
    drone/ros2_ws/src/bennu_core/test
    drone/ros2_ws/src/bennu_dataset/test
    drone/ros2_ws/src/bennu_mission/test
    drone/ros2_ws/src/bennu_survey/test
    tests
    sim/scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*
