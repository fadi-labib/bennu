# Bennu SIL Testing — Headless CI + smoke tests
# Usage: make test-sitl
#
# px4-sitl uses prebuilt GHCR image with local build fallback.
# test-runner always builds locally. No GPU required.

services:
  px4-sitl:
    image: ghcr.io/fadi-labib/bennu/px4-sitl:latest
    build:
      context: ..
      dockerfile: sim/Dockerfile.px4
    container_name: bennu-px4-sitl-sil
    network_mode: host
    environment:
      - PX4_SYS_AUTOSTART=4001
      - PX4_GZ_MODEL=x500
      - HEADLESS=1
      # Run Gazebo as a separate process (prevents GUI spawn in CI)
      - PX4_GZ_STANDALONE=1
    command: >-
      bash -c "echo '=== SIL: Headless PX4 SITL ===' &&
      make px4_sitl gz_x500"

  test-runner:
    image: ghcr.io/fadi-labib/bennu/ros2-dev:latest
    build:
      context: ..
      dockerfile: sim/Dockerfile.ros2
    container_name: bennu-test-runner
    network_mode: host
    volumes:
      - ../drone/ros2_ws/src:/ros2_ws/src/bennu:rw
      - ../tests:/ros2_ws/tests:rw
      - ../contract:/ros2_ws/contract:rw
      - ./scripts:/ros2_ws/scripts:ro
      - ./scenarios:/ros2_ws/scenarios:ro
      - ./artifacts:/ros2_ws/artifacts:rw
    depends_on:
      - px4-sitl
    command: ["python3", "/ros2_ws/scripts/run_mission.py", "--scenario", "/ros2_ws/scenarios/nominal_survey.yaml"]
