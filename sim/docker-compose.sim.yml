# Bennu SITL Simulation Stack
# Usage:
#   cd sim && docker compose -f docker-compose.sim.yml up                    (headless)
#   cd sim && docker compose -f docker-compose.sim.yml -f gpu.yml up         (with Gazebo GUI)
#
# Starts PX4 SITL with Gazebo Harmonic and ROS2 Jazzy with uXRCE-DDS.
# QGroundControl auto-connects on localhost (host networking).
#
# The base file runs headless (no GPU required). For the Gazebo 3D GUI,
# layer gpu.yml which adds NVIDIA GPU passthrough and X11 forwarding.
# See gpu.yml header for prerequisites.

services:
  px4-sitl:
    build:
      context: ..
      dockerfile: sim/Dockerfile.px4
    container_name: bennu-px4-sitl
    network_mode: host
    environment:
      - PX4_SYS_AUTOSTART=4001
      - PX4_GZ_MODEL=x500
      - BENNU_GUI=0
    # HEADLESS=1 tells Gazebo to run physics-only without the GUI window
    command: ["bash", "-c", "if [ \"$$BENNU_GUI\" = \"1\" ]; then echo '=== Gazebo GUI: ENABLED ==='; unset HEADLESS; else echo '=== Gazebo GUI: DISABLED (layer gpu.yml to enable) ==='; export HEADLESS=1; fi && make px4_sitl gz_x500"]

  ros2-dev:
    build:
      context: ..
      dockerfile: sim/Dockerfile.ros2
    container_name: bennu-ros2-dev
    network_mode: host
    volumes:
      - ../drone/ros2_ws/src:/ros2_ws/src/bennu:rw
    depends_on:
      - px4-sitl
    stdin_open: true
    tty: true
