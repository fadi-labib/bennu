# Bennu SITL Simulation Stack
# Usage: cd sim && docker compose -f docker-compose.sim.yml up
#
# Starts PX4 SITL with Gazebo Harmonic and ROS2 Jazzy with uXRCE-DDS.
# Connect QGroundControl on host to localhost:14540.
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed
#   - xhost +local:docker (for Gazebo GUI)

services:
  px4-sitl:
    build:
      context: ..
      dockerfile: sim/Dockerfile.px4
    container_name: bennu-px4-sitl
    environment:
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
      - PX4_SYS_AUTOSTART=4001
      - PX4_GZ_MODEL=x500
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    ports:
      - "14540:14540/udp"
      - "14580:14580/udp"
    networks:
      - bennu-sim
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, display]

  ros2-dev:
    build:
      context: ..
      dockerfile: sim/Dockerfile.ros2
    container_name: bennu-ros2-dev
    environment:
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../drone/ros2_ws/src:/ros2_ws/src/bennu:rw
    depends_on:
      - px4-sitl
    networks:
      - bennu-sim
    stdin_open: true
    tty: true

networks:
  bennu-sim:
    driver: bridge
