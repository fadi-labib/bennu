# Bennu Dev Environment — Interactive development + pytest-watch
# Usage: make dev or make dev-watch
#
# Headless PX4 SITL + ROS2 Jazzy with source mounts for live editing.
# QGroundControl auto-connects on localhost:14550 (host networking).

name: bennu-dev

services:
  px4-sitl:
    build:
      context: ..
      dockerfile: sim/Dockerfile.px4
    container_name: bennu-px4-sitl-dev
    network_mode: host
    environment:
      - PX4_SYS_AUTOSTART=4001
      - PX4_GZ_MODEL=x500
      - HEADLESS=1
    command: >-
      bash -c "echo '=== Gazebo GUI: DISABLED (use make dev-debug for GUI) ===' &&
      make px4_sitl gz_x500"
    healthcheck:
      # 0x488A = port 18570 (PX4 MAVLink GCS link) — bound when PX4 is ready
      test: ["CMD-SHELL", "grep -q ':488A ' /proc/net/udp"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

  ros2-dev:
    build:
      context: ..
      dockerfile: sim/Dockerfile.ros2
    container_name: bennu-ros2-dev
    network_mode: host
    volumes:
      - ../drone/ros2_ws/src:/ros2_ws/src/bennu:rw
      - ../tests:/ros2_ws/tests:rw
      - ../contract:/ros2_ws/contract:rw
      - ./scripts:/ros2_ws/scripts:ro
      - ./scenarios:/ros2_ws/scenarios:ro
    depends_on:
      px4-sitl:
        condition: service_healthy
    stdin_open: true
    tty: true
