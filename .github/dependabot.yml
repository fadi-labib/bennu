version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: "/sim"
    schedule:
      interval: monthly
    labels:
      - docker
    open-pull-requests-limit: 3
