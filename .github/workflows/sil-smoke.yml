name: SIL Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6am UTC

jobs:
  sil-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Pull prebuilt images
        run: |
          docker pull ghcr.io/fadi-labib/bennu/px4-sitl:latest &
          docker pull ghcr.io/fadi-labib/bennu/ros2-dev:latest &
          wait
        timeout-minutes: 10

      - name: Prepare artifact directory
        run: mkdir -p sim/artifacts

      - name: Run SIL smoke test
        working-directory: sim
        run: |
          docker compose -f docker-compose.sil.yml up \
            --abort-on-container-exit \
            --exit-code-from test-runner
        timeout-minutes: 15

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sil-artifacts
          path: sim/artifacts/

      - name: Cleanup
        if: always()
        working-directory: sim
        run: docker compose -f docker-compose.sil.yml down -v
