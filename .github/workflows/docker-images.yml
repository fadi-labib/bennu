name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'sim/Dockerfile.*'
      - 'drone/ros2_ws/src/**'
      - 'requirements-dev.txt'
  pull_request:
    branches: [main]
    paths:
      - 'sim/Dockerfile.*'
      - 'drone/ros2_ws/src/**'
      - 'requirements-dev.txt'
  schedule:
    - cron: '0 4 * * 0'  # Weekly Sunday 4am UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PX4_IMAGE: ghcr.io/fadi-labib/bennu/px4-sitl
  ROS2_IMAGE: ghcr.io/fadi-labib/bennu/ros2-dev

jobs:
  build-px4:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: sim/Dockerfile.px4
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.PX4_IMAGE }}:v1.16.1,${{ env.PX4_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ros2:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: sim/Dockerfile.ros2
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.ROS2_IMAGE }}:jazzy,${{ env.ROS2_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
