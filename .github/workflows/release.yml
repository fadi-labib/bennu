name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi

          COMPARE_BASE="${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}"

          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "## What's Changed"
            echo ""
            echo "$COMMITS" | while read -r line; do
              echo "- $line"
            done
            echo ""
            echo "**Full Changelog**: https://github.com/fadi-labib/bennu/compare/${COMPARE_BASE}...${TAG_NAME}"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Package release artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          tar -czf "dist/bennu-${TAG_NAME}-px4-params.tar.gz" \
            -C firmware/px4 params upload_params.sh flash.sh VERSION
          tar -czf "dist/bennu-${TAG_NAME}-contract-v1.tar.gz" \
            -C contract v1
          (cd dist && sha256sum *.tar.gz > checksums.sha256)
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: false
          files: |
            dist/*.tar.gz
            dist/checksums.sha256
