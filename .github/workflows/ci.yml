name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        run: pip install "ruff>=0.4,<1"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            drone/ros2_ws/src/*/setup.py

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e drone/ros2_ws/src/bennu_camera
          pip install -e drone/ros2_ws/src/bennu_core
          pip install -e drone/ros2_ws/src/bennu_dataset
          pip install -e drone/ros2_ws/src/bennu_mission
          pip install -e drone/ros2_ws/src/bennu_survey

      - name: Validate contract schema
        run: |
          python -c "
          import json, jsonschema
          schema = json.load(open('contract/v1/manifest.schema.json'))
          example = json.load(open('contract/v1/example/manifest.json'))
          jsonschema.validate(example, schema)
          print('Contract schema validation passed')
          "

      - name: Test with coverage
        run: |
          python -m pytest drone/ros2_ws/src/*/test/ tests/ sim/scripts/ \
            -v --tb=short \
            --cov=drone/ros2_ws/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90 \
            --junitxml=test-results.xml

      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true
