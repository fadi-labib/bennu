name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        run: pip install "ruff>=0.4,<1"

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e drone/ros2_ws/src/bennu_camera
          pip install -e drone/ros2_ws/src/bennu_core
          pip install -e drone/ros2_ws/src/bennu_dataset
          pip install -e drone/ros2_ws/src/bennu_mission
          pip install -e drone/ros2_ws/src/bennu_survey

      - name: Test
        run: python -m pytest drone/ros2_ws/src/*/test/ tests/ sim/scripts/ -v --tb=short
