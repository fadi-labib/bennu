name: Hardware Issue
description: Report a hardware problem (frame, wiring, components)
labels: ["hardware"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's the hardware issue?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Frame / structure
        - Wiring / connectors
        - Motors / ESC / props
        - Flight controller (Pixhawk)
        - Companion computer (Pi 4)
        - Camera / lens
        - GPS
        - Battery / power
        - 3D printed parts
    validations:
      required: true
  - type: textarea
    id: photos
    attributes:
      label: Photos
      description: Attach photos of the issue if possible
    validations:
      required: false
